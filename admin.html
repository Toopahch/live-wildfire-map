<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Live Wildfire Map · News Admin</title>
  <style>
    :root{--bg:#0b0e14;--panel:#141926;--panel2:#1a2030;--border:rgba(255,255,255,.09);
      --text:#e8edf5;--dim:#9aa7bd;--faint:#5e6a80;--ember:#ff6b35;--green:#34d399;--red:#ef4444;--amber:#fbbf24}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,Segoe UI,sans-serif;font-size:14px}
    header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
    header h1{font-size:17px;margin:0;font-weight:800}
    header h1 b{color:var(--green)}
    .wrap{max-width:1180px;margin:0 auto;padding:22px 24px}
    .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:18px}
    label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);margin:8px 0 4px}
    input{width:100%;padding:9px 11px;border-radius:8px;background:#0e1320;border:1px solid var(--border);color:var(--text);font-size:13px;font-family:inherit}
    .row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
    button{cursor:pointer;font-family:inherit;font-weight:600;border:none;border-radius:8px;padding:9px 14px;font-size:13px}
    .btn-primary{background:linear-gradient(180deg,#ff8c42,#ff4d2e);color:#fff}
    .btn-ghost{background:var(--panel2);color:var(--text);border:1px solid var(--border)}
    .btn-sm{padding:5px 10px;font-size:12px}
    .btn-red{background:rgba(239,68,68,.16);color:#ffc6c6;border:1px solid rgba(239,68,68,.4)}
    .btn-green{background:rgba(52,211,153,.16);color:#b8f5dc;border:1px solid rgba(52,211,153,.4)}
    table{width:100%;border-collapse:collapse;font-size:12.5px}
    th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:top}
    th{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--faint)}
    tr.hidden-row{opacity:.45}
    .pill{display:inline-block;padding:2px 7px;border-radius:999px;font-size:10.5px;font-weight:700}
    .pill-official{background:rgba(52,211,153,.16);color:#b8f5dc}
    .pill-news{background:rgba(255,255,255,.08);color:var(--dim)}
    .score{font-family:'JetBrains Mono',monospace;font-weight:700}
    .reason{color:var(--dim);max-width:280px}
    a{color:#ff8c42}
    .muted{color:var(--faint);font-size:12px}
    .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--border);padding:10px 16px;border-radius:10px;font-size:13px;display:none}
    h2{font-size:14px;margin:0 0 12px}
  </style>
</head>
<body>
  <header>
    <img src="logo.svg" width="30" height="30" alt="Live Wildfire Map logo" />
    <h1><b>Live</b> Wildfire Map · News Admin</h1>
    <span class="muted">moderation dashboard</span>
  </header>
  <div class="wrap">
    <div class="card">
      <h2>Connection</h2>
      <div class="row">
        <div>
          <label>Functions base URL</label>
          <input id="fnurl" placeholder="https://YOUR_REF.functions.supabase.co" />
        </div>
        <div>
          <label>Admin token</label>
          <input id="token" type="password" placeholder="your ADMIN_TOKEN secret" />
        </div>
        <div style="display:flex;align-items:flex-end;gap:8px">
          <button class="btn-primary" id="load">Load news</button>
          <button class="btn-ghost" id="loadBlocked">Blocked sources</button>
        </div>
      </div>
      <p class="muted" style="margin-top:10px">Credentials are stored only in this browser (localStorage). The admin token is verified server-side; the database service key is never exposed here.</p>
    </div>

    <div class="card">
      <h2 id="listTitle">Recent news <span class="muted" id="count"></span></h2>
      <div style="overflow:auto">
        <table id="tbl"><thead><tr>
          <th>Fire</th><th>Headline</th><th>Source</th><th>Score</th><th>Why it matched</th><th>State</th><th>Actions</th>
        </tr></thead><tbody></tbody></table>
      </div>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    const $ = (id) => document.getElementById(id);
    // restore saved connection
    $('fnurl').value = localStorage.getItem('wf_fnurl') || '';
    $('token').value = localStorage.getItem('wf_token') || '';

    function toast(msg){ const t=$('toast'); t.textContent=msg; t.style.display='block'; setTimeout(()=>t.style.display='none',2200); }
    function save(){ localStorage.setItem('wf_fnurl',$('fnurl').value.trim().replace(/\/$/,'')); localStorage.setItem('wf_token',$('token').value.trim()); }

    async function api(action, extra={}){
      save();
      const base = $('fnurl').value.trim().replace(/\/$/,'');
      const res = await fetch(`${base}/news-admin`,{
        method:'POST',
        headers:{'Content-Type':'application/json','x-admin-token':$('token').value.trim()},
        body:JSON.stringify({action,...extra})
      });
      const data = await res.json();
      if(!res.ok){ throw new Error(data.error || ('HTTP '+res.status)); }
      return data;
    }

    function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

    async function loadNews(){
      try{
        const {rows} = await api('list',{limit:120});
        $('count').textContent = `(${rows.length})`;
        $('listTitle').firstChild.textContent = 'Recent news ';
        const tb = $('tbl').querySelector('tbody'); tb.innerHTML='';
        rows.forEach(r=>{
          const tr=document.createElement('tr');
          if(r.is_hidden) tr.className='hidden-row';
          tr.innerHTML = `
            <td>${esc(r.fire_name||r.fire_id)}</td>
            <td><a href="${esc(r.article_url)}" target="_blank" rel="noopener">${esc(r.title)}</a></td>
            <td>${esc(r.source_name||r.domain||'')}<br><span class="pill ${r.is_official_source?'pill-official':'pill-news'}">${r.is_official_source?'Official':'News'}</span></td>
            <td class="score">${r.confidence_score}</td>
            <td class="reason">${esc(r.match_reason||'')}</td>
            <td>${esc(r.state||'')}</td>
            <td style="white-space:nowrap"></td>`;
          const actions = tr.lastElementChild;
          const hideBtn=document.createElement('button');
          hideBtn.className='btn-sm '+(r.is_hidden?'btn-green':'btn-ghost');
          hideBtn.textContent = r.is_hidden?'Unhide':'Hide';
          hideBtn.onclick = async()=>{ try{ await api(r.is_hidden?'unhide':'hide',{id:r.id}); toast(r.is_hidden?'Article restored':'Article hidden'); loadNews(); }catch(e){toast(e.message);} };
          const blockBtn=document.createElement('button');
          blockBtn.className='btn-sm btn-red'; blockBtn.style.marginLeft='6px'; blockBtn.textContent='Block source';
          blockBtn.onclick = async()=>{ if(!r.domain){toast('No domain');return;} if(!confirm('Block all future articles from '+r.domain+'?'))return; try{ await api('block_source',{domain:r.domain}); toast('Blocked '+r.domain); loadNews(); }catch(e){toast(e.message);} };
          actions.append(hideBtn, blockBtn);
          tb.append(tr);
        });
      }catch(e){ toast('Error: '+e.message); }
    }

    async function loadBlocked(){
      try{
        const {rows} = await api('blocked');
        $('listTitle').firstChild.textContent='Blocked sources ';
        $('count').textContent=`(${rows.length})`;
        const tb=$('tbl').querySelector('tbody'); tb.innerHTML='';
        if(!rows.length){ tb.innerHTML='<tr><td colspan="7" class="muted">No blocked sources.</td></tr>'; return; }
        rows.forEach(r=>{
          const tr=document.createElement('tr');
          tr.innerHTML=`<td colspan="5"><b>${esc(r.domain)}</b> <span class="muted">— ${esc(r.reason||'')}</span></td><td>${esc((r.created_at||'').slice(0,10))}</td><td></td>`;
          const btn=document.createElement('button'); btn.className='btn-sm btn-green'; btn.textContent='Unblock';
          btn.onclick=async()=>{ try{ await api('unblock_source',{domain:r.domain}); toast('Unblocked'); loadBlocked(); }catch(e){toast(e.message);} };
          tr.lastElementChild.append(btn); tb.append(tr);
        });
      }catch(e){ toast('Error: '+e.message); }
    }

    $('load').onclick = loadNews;
    $('loadBlocked').onclick = loadBlocked;
  </script>
</body>
</html>
